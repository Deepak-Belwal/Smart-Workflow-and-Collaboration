<!DOCTYPE html>
<html>
<head>
    <title>Smart Workflow System</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* Hamburger */
        .hamburger {
            font-size: 26px;
            padding: 15px;
            cursor: pointer;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -260px;
            top: 0;
            width: 260px;
            height: 100%;
            background: #2c3e50;
            color: white;
            padding-top: 60px;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            display: none;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            top: 0;
            left: 0;
            z-index: 500;
        }

        /* Main Content */
        .content {
            text-align: center;
            padding: 120px 20px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 20px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<!-- Hamburger -->
<div class="hamburger" onclick="toggleSidebar()">☰</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
    <a href="login.html">Login</a>
    <a href="register.html">Sign Up</a>
    <a href="#">About Project</a>
    <a href="#">Contact</a>
</div>

<!-- Overlay -->
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<!-- Main Content -->
<div class="content">
    <h1>Smart Workflow & Task Coordination</h1>
    <p>Manage tasks, assign workflows, and collaborate efficiently.</p>

    <button class="btn" onclick="window.location.href='login.html'">
        Get Started
    </button>
</div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    if (sidebar.style.left === "0px") {
        sidebar.style.left = "-260px";
        overlay.style.display = "none";
    } else {
        sidebar.style.left = "0px";
        overlay.style.display = "block";
    }
}
</script>

</body>
</html>
