<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        * {
            box-sizing: border-box;
        }

        /* HEADER */
        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* MAIN */
        .main {
            padding: 20px;
        }

        /* TASK CARD */
        .task-card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        /* BUTTONS */
        button {
            margin-top: 8px;
            margin-right: 5px;
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-start {
            background: orange;
            color: white;
        }
        .btn-start:hover {
            background: rgb(201, 130, 0);
            transform: scale(1.05);
        }

        .btn-done {
            background: green;
            color: white;
        }
        .btn-done:hover {
            background: rgb(0, 100, 0);
            transform: scale(1.05);
        }

        .btn-delete {
            background: red;
            color: white;
        }
        .btn-delete:hover {
            background: rgb(162, 0, 0);
            transform: scale(1.05);
        }

        /* USER GROUP */
        .user-group {
            margin-top: 20px;
        }
        /* FORM CARD */
        .form-card {
            padding: 20px;
        }

        /* TITLE */
        .form-title {
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* INPUT BASE */
        .form-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        /* FORM WRAPPER controls width */
        .form-wrapper {
            max-width: 340px;
        }

        /* assigned_to now matches row width */
        #assigned_to {
            width: 100%;
        }

        /* TITLE INPUT (BIG + BOLD LOOK) */
        .title-input {
            font-size: 18px;
            font-weight: 600;
        }

        /* DESCRIPTION (2 LINES) */
        .desc-input {
            height: 60px;
            resize: none;
        }

        /* ROW layout */
        .row {
            display: flex;
            gap: 16px; /* more spacing between fields */
        }

        /* PRIORITY smaller */
        .priority-input {
            flex: 1;
            max-width: 140px;
        }

        /* DATE smaller */
        #deadline {
            flex: 1;
            max-width: 160px;
        }

        .row .form-input {
            flex: 1;
        }

        /* BUTTON ALIGN RIGHT */
        .btn-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        /* BUTTON STYLE */
        .btn-create {
            background: rgb(0, 140, 255);
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-create:hover {
            background: rgb(0, 94, 171);
            transform: scale(1.05);
        }
        
        .kanban {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .column {
            flex: 1;
            background: #ecf0f1;
            padding: 10px;
            border-radius: 8px;
            min-height: 300px;
        }

        .column h3 {
            text-align: center;
        }

        .task-card {
            background: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
}
    </style>
</head>
<body>

<div class="header">
    <h2>Dashboard</h2>
    <span id="roleDisplay"></span>
</div>

<div class="main">

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="task-card form-card">
        <h3 class="form-title">Create Task</h3>
        <div class="form-wrapper">
            <!-- TITLE -->
            <input class="form-input title-input" id="title" placeholder="Title" style="width:600px;">

            <!-- DESCRIPTION -->
            <textarea class="form-input desc-input" id="desc" placeholder="Description" style="width:1000px;"></textarea>

            <!-- PRIORITY + DATE -->
            <div class="row">
                <select class="form-input priority-input" id="priority">
                    <option value="">Select Priority</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
                <input class="form-input" id="deadline" type="date">
            </div>

            <!-- ASSIGN -->
            <select class="form-input" id="assigned_to" style="width:320px;"></select>
        </div>

        <!-- BUTTON -->
        <div class="btn-row">
            <button class="btn-create" onclick="createTask()">Create Task</button>
        </div>
    </div>

    <h3>Tasks</h3>
    <div class="kanban">
        <div class="column" id="todo">
            <h3>To Do</h3>
        </div>

        <div class="column" id="in_progress">
            <h3>In Progress</h3>
        </div>

        <div class="column" id="done">
            <h3>Done</h3>
        </div>

    </div>

</div>

<script>

let currentUser = null;

function checkUser() {
    fetch("../backend/get_current_user.php")
    .then(res => res.json())
    .then(data => {

        if (!data.logged_in) {
            window.location.href = "login.html";
            return;
        }

        currentUser = data;

        document.getElementById("roleDisplay").innerText = data.role.toUpperCase();

        if (data.role !== "admin") {
            document.getElementById("adminPanel").style.display = "none";
        } else {
            loadUsers();
        }

        loadTasks();
    });
}

function loadUsers() {
    fetch("../backend/get_users.php")
    .then(res => res.json())
    .then(data => {
        let options = "";
        data.forEach(user => {
            options += `<option value="${user.id}">${user.name}</option>`;
        });
        document.getElementById("assigned_to").innerHTML = options;
    });
}

function loadTasks() {

    // Clear columns first
    document.getElementById("todo").innerHTML = "<h3>To Do</h3>";
    document.getElementById("in_progress").innerHTML = "<h3>In Progress</h3>";
    document.getElementById("done").innerHTML = "<h3>Done</h3>";

    // ADMIN
    if (currentUser.role === "admin") {

        fetch("../backend/get_all_tasks.php")
        .then(res => res.json())
        .then(data => {

            data.forEach(task => {
                let html = `
                    <div class="task-card">
                        <b>${task.title}</b><br>
                        ${task.name}<br>

                        <button class="btn-delete" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                `;

                document.getElementById(task.status).innerHTML += html;
            });

        });
    }

    // MEMBER
    else {

        fetch("../backend/get_tasks.php")
        .then(res => res.json())
        .then(data => {

            data.forEach(task => {
                let html = `
                    <div class="task-card">
                        <b>${task.title}</b><br>

                        <button class="btn-start" onclick="updateTask(${task.id}, 'in_progress')">Start</button>
                        <button class="btn-done" onclick="updateTask(${task.id}, 'done')">Done</button>
                    </div>
                `;

                document.getElementById(task.status).innerHTML += html;
            });

        });
    }
}

function createTask() {
    fetch("../backend/create_task.php", {
        method: "POST",
        body: new URLSearchParams({
            title: document.getElementById("title").value,
            description: document.getElementById("desc").value,
            priority: document.getElementById("priority").value,
            deadline: document.getElementById("deadline").value,
            assigned_to: document.getElementById("assigned_to").value
        })
    })
    .then(res => res.text())
    .then(() => loadTasks());
}

function updateTask(id, status) {
    fetch("../backend/update_task.php", {
        method: "POST",
        body: new URLSearchParams({ id, status })
    }).then(() => loadTasks());
}

function deleteTask(id) {
    fetch("../backend/delete_task.php", {
        method: "POST",
        body: new URLSearchParams({ id })
    }).then(() => loadTasks());
}

window.onload = checkUser;

</script>

</body>
</html>
