<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>Dashboard</title>

<style>

body {
    background: linear-gradient(to bottom right, #0f172a, #020617);
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

* { box-sizing: border-box; }

.app { display: flex; }

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: -220px;
    top: 0;
    width: 220px;
    height: 100%;
    background: #020617;
    padding: 20px;
    transition: 0.3s;
    z-index: 9999;
}

#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    display: none;
    z-index: 5000; /* below sidebar */
}

.sidebar.active { left: 0; }

.sidebar button {
    background: transparent;
    color: white;
    border: none;
    padding: 12px;
    text-align: left;
    cursor: pointer;
    border-radius: 5px;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.1);
}

/* MAIN */
.main-content {
    flex: 1;
    padding: 20px;
}

.header {
    background: #1e293b;
    padding: 15px;
    margin: 10px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-left {
    display: flex;
    gap: 10px;
}

.header button {
    background: transparent;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.home-btn:hover {
    transform: scale(1.2);
}

.header-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.user-info {
    display: flex;
    flex-direction: column;
    font-size: 12px;
    color: #cbd5f5;
}

#userRole {
    background: rgba(59,130,246,0.2);
    padding: 3px 8px;
    border-radius: 5px;
    font-weight: bold;
}

.header-right img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;

    border: 2px solid #3b82f6;
}

/* CARD */
.task-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 20px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.task-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

#adminPanel {
    margin:10px;
}
#analyticsSection{
    margin: 10px;
}
#profileSection{
    margin:10px;
}

.analytics-wrapper {
    display: flex;
    justify-content: space-between;
    align-items: center;

    gap: 60px;
    padding: 40px;

    min-height: 400px; /* overall size bigger */
    animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* LEFT CARD */
.analytics-overview {
    flex: 1;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);

    padding: 30px;
    border-radius: 12px;

    border: 1px solid rgba(255,255,255,0.1);
}

.analytics-overview h2 {
    margin-bottom: 20px;
}

.analytics-overview p {
    font-size: 16px;
    margin: 12px 0;
}

/* TIP BOX */
.analytics-tip {
    margin-top: 20px;
    padding: 12px;

    border-radius: 8px;
    background: rgba(255,255,255,0.05);
}

/* RIGHT CHART */
.analytics-chart {
    flex: 1;

    height: 400px;   /* 🔥 increased height (fix overflow) */
    max-width: 500px;
}

/* MAKE CANVAS FILL */
.analytics-chart canvas {
    width: 100%;
    height: 100%;
}

.analytics-info {
    width: 300px;
}

.analytics-info p {
    margin: 10px 0;
    font-size: 16px;
}

.chart-box {
    width: 300px;
    height: 300px;
}

/* FORM */
.form-input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
    background: #334155;
    color: white;
}

/* TITLE (SHORT + BOLD) */
.title-input {
    width: 60%;
    font-size: 18px;
    font-weight: bold;
}

/* DESCRIPTION (2 lines) */
.desc-input {
    width: 80%;
    height: 60px;
}

/* ROW (priority + date small) */
.row {
    display: flex;
    gap: 10px;
    width: 50%;
}

.row select,
.row input {
    flex: 1;
}

/* ASSIGNED TO = SAME WIDTH AS ROW */
#assigned_to {
    width: 50%;
}

/* BUTTON ALIGN RIGHT */
.btn-row {
    width: 100%;
    display: flex;
    justify-content: flex-end;
}

/* BUTTON */
.btn-create {
    background: #3b82f6;
    padding: 10px 20px;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.btn-start { background: orange; }
.btn-done { background: green; }
.btn-delete { background: red; }

/* KANBAN */
.kanban {
    margin: 10px;
    display: flex;
    gap: 20px;
}

.column {
    flex: 1;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 10px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
}

.chart-container {
    height: 300px;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <br><button onclick="navigate('tasks')"><h3><b>TASKS</b></h3></button>
    <br><button onclick="navigate('analytics')"><h3><b>ANALYTICS</b></h3></button>
    <br><button onclick="navigate('profile')"><h3><b>PROFILE</b></h3></button>
</div>
<div id="overlay" onclick="toggleSidebar()"></div>

<div class="main-content">

<div class="header">
    <div class="header-left">
        <button onclick="toggleSidebar()">☰</button>
        <button onclick="goHome()" class="home-btn">🏠</button>
    </div>
    <div class="header-right">
        <img id="profilePic" src="https://via.placeholder.com/40" alt="Profile">
        <div class="user-info">
            <h1><b><span id="roleDisplay"></span></b></h1>
        </div>
    </div>
</div>

<!-- TASKS -->
<div id="tasksSection">

<div id="adminPanel" class="task-card">

<h3>Create Task</h3>

<input class="form-input title-input" id="title" placeholder="Title">

<textarea class="form-input desc-input" id="desc" placeholder="Description"></textarea>

<div class="row">
    <select class="form-input" id="priority">
        <option value="">Priority</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select>

    <input class="form-input" id="deadline" type="date">
</div>

<select class="form-input" id="assigned_to"></select>

<div class="btn-row">
    <button class="btn-create" onclick="createTask()">Create Task</button>
</div>

</div>

<div class="kanban">
    <div class="column" id="todo"><h3>To Do</h3></div>
    <div class="column" id="in_progress"><h3>In Progress</h3></div>
    <div class="column" id="done"><h3>Done</h3></div>
</div>

</div>

<!-- ANALYTICS -->
<div id="analyticsSection" style="display:none;">

    <!-- MAIN GLASS CARD -->
    <div class="task-card analytics-wrapper">

        <!-- LEFT: OVERVIEW CARD -->
        <div class="analytics-overview">
            <h2>Analytics Overview</h2>

            <p>Total Tasks: <span id="totalTasks">0</span></p>
            <p>To Do: <span id="todoCount">0</span></p>
            <p>In Progress: <span id="progressCount">0</span></p>
            <p>Completed: <span id="doneCount">0</span></p>

            <div class="analytics-tip">
                🚀 Keep more tasks in "Done" to improve workflow efficiency
            </div>
        </div>

        <!-- RIGHT: CHART (NO CARD) -->
        <div class="analytics-chart">
            <canvas id="taskChart"></canvas>
        </div>

    </div>

</div>

<!-- PROFILE -->
<div id="profileSection" style="display:none;">
    <div class="task-card">
        <h2>My Profile</h2>
        <p>Name: <span id="profileName"></span></p>
        <p>Email: <span id="profileEmail"></span></p>
    </div>
</div>

</div>
</div>

<script>

    function navigate(section) {
    showSection(section);
    toggleSidebar();
}

let currentUser = null;

function checkUser() {
    fetch("../backend/get_current_user.php")
    .then(res => res.json())
    .then(data => {
        if (data.profile_image) {
            document.getElementById("profilePic").src = "../uploads/" + data.profile_image;
        }
        if (!data.logged_in) {
            window.location.href = "login.html";
            return;
        }

        currentUser = data;

        document.getElementById("roleDisplay").innerText = data.role.toUpperCase();
        document.getElementById("profileName").innerText = data.name;
        document.getElementById("profileEmail").innerText = data.email;

        if (data.role !== "admin") {
            document.getElementById("adminPanel").style.display = "none";
        } else {
            loadUsers();
        }

        loadTasks();
    });
}

function loadUsers() {
    fetch("../backend/get_users.php")
    .then(res => res.json())
    .then(data => {
        let options = "";
        data.forEach(user => {
            options += `<option value="${user.id}">${user.name}</option>`;
        });
        document.getElementById("assigned_to").innerHTML = options;
    });
}

function loadTasks() {

    document.getElementById("todo").innerHTML = "<h3>To Do</h3>";
    document.getElementById("in_progress").innerHTML = "<h3>In Progress</h3>";
    document.getElementById("done").innerHTML = "<h3>Done</h3>";

    let url = currentUser.role === "admin"
        ? "../backend/get_all_tasks.php"
        : "../backend/get_tasks.php";

    fetch(url)
    .then(res => res.json())
    .then(data => {

        let todo = 0, inProgress = 0, done = 0;

        data.forEach(task => {

            let html = `
                <div class="task-card">
                    <b>${task.title}</b><br>

                    ${currentUser.role === "admin"
                        ? `<button class="btn-delete" onclick="deleteTask(${task.id})">Delete</button>`
                        : `
                        <button class="btn-start" onclick="updateTask(${task.id}, 'in_progress')">Start</button>
                        <button class="btn-done" onclick="updateTask(${task.id}, 'done')">Done</button>
                        `}
                </div>
            `;

            document.getElementById(task.status).innerHTML += html;

            if (task.status === "todo") todo++;
            else if (task.status === "in_progress") inProgress++;
            else if (task.status === "done") done++;
        });

        // 🔥 UPDATE ANALYTICS TEXT (NEW)
        document.getElementById("todoCount").innerText = todo;
        document.getElementById("progressCount").innerText = inProgress;
        document.getElementById("doneCount").innerText = done;
        document.getElementById("totalTasks").innerText = todo + inProgress + done;

        renderChart(todo, inProgress, done);
    });
}

function createTask() {
    fetch("../backend/create_task.php", {
        method: "POST",
        body: new URLSearchParams({
            title: document.getElementById("title").value,
            description: document.getElementById("desc").value,
            priority: document.getElementById("priority").value,
            deadline: document.getElementById("deadline").value,
            assigned_to: document.getElementById("assigned_to").value
        })
    }).then(() => loadTasks());
}

function updateTask(id, status) {
    fetch("../backend/update_task.php", {
        method: "POST",
        body: new URLSearchParams({ id, status })
    }).then(() => loadTasks());
}

function deleteTask(id) {
    fetch("../backend/delete_task.php", {
        method: "POST",
        body: new URLSearchParams({ id })
    }).then(() => loadTasks());
}

function goHome() {
    window.location.href = "index.html";
}

let chartInstance = null;

function renderChart(todo, inProgress, done) {

    const ctx = document.getElementById("taskChart").getContext("2d");

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['To Do', 'In Progress', 'Done'],
            datasets: [{
                data: [todo, inProgress, done],
                backgroundColor: ['#ef4444', '#f59e0b', '#22c55e'],
                borderColor: "#0f172a",
                borderWidth: 2,

                hoverOffset: 30   // 🔥 THIS IS THE MAGNIFICATION EFFECT
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,

            plugins: {
                legend: {
                    labels: {
                        color: "#e2e8f0",
                        font: {
                            size: 14
                        }
                    }
                },
                tooltip: {
                    backgroundColor: "#1e293b",
                    titleColor: "#fff",
                    bodyColor: "#cbd5f5"
                }
            }
        }
    });
}

function showSection(section) {
    document.getElementById("tasksSection").style.display = "none";
    document.getElementById("analyticsSection").style.display = "none";
    document.getElementById("profileSection").style.display = "none";
    document.getElementById(section + "Section").style.display = "block";
}

function toggleSidebar() {
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("overlay");
    sidebar.classList.toggle("active");
    if (sidebar.classList.contains("active")) {
        overlay.style.display = "block";
    } else {
        overlay.style.display = "none";
    }
}

window.onload = checkUser;

</script>

</body>
</html>
