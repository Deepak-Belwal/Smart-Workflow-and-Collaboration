<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<script>
    function showFileName(input) {
        const fileText = document.getElementById("fileText");
        const preview = document.getElementById("preview");

        if (input.files.length > 0) {
            fileText.innerText = input.files[0].name;

            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = "block";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    background-image: url("../img/log_sign_in.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* GLASS CARD */
.container {
    width: 420px;
    padding: 40px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);

    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);

    box-shadow: 0 0 40px rgba(0,0,0,0.5);

    animation: fadeIn 0.6s ease;
}

h2 {
    margin-bottom: 25px;
    color: rgba(255, 255, 255, 0.427);
}

/* INPUTS */
input {
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    margin: 12px 0;

    border-radius: 8px;
    border: none;

    background: rgba(255,255,255,0.1);
    color: rgba(255, 255, 255, 0.676);

    transition: 0.3s;
}

input:focus {
    outline: none;
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 10px rgba(59,130,246,0.6);
}

/* FILE INPUT FIX */
input[type="file"] {
    padding: 10px;
}

.file-upload {
    width: 100%;
    box-sizing: border-box;
    display: block;
    margin: 12px 0;

    padding: 14px;
    border-radius: 8px;

    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);

    cursor: pointer;
    transition: 0.3s;
    text-align: center;
}

.file-upload:hover {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 10px rgba(59,130,246,0.4);
}

/* HIDE REAL INPUT */
.file-upload input {
    display: none;
}

/* BUTTON */
button {
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    margin-top: 15px;

    border: none;
    border-radius: 8px;

    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;

    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

button:active {
    transform: scale(0.98);
}

label {
    font-size: 13px;
    opacity: 0.8;
    color: rgba(255, 255, 255, 0.716);
}

p {
    margin-top: 15px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.716);
}

a {
    color: #60a5fa;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>Register</h2>

    <form action="../backend/register.php" method="POST" enctype="multipart/form-data">

        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <label>Upload Profile Image</label>
        <label class="file-upload">
            <input type="file" name="profile_image" accept="image/*" onchange="showFileName(this)">
            <span id="fileText">Upload Profile Image</span>
        </label>
        <img id="preview" style="display:none; width:80px; border-radius:50%; margin-top:10px;">

        <button type="submit">Register</button>

    </form>

    <p>Already have an account? <a href="login.html">Log in</a></p>
</div>

</body>
</html>
